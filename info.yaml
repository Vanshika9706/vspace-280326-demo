project:
  title:        "Medical Battery Safety Monitor"
  author:       "Anjani"
  discord:      ""
  description:  "Li-ion cell safety monitor with voltage, current, and thermal protection. Features a 4-state FSM (IDLE/WARN/FAULT/SHUTDOWN), sticky thermal latch, hysteresis recovery, watchdog escalation, and 2-bit SOC estimation."
  language:     "Verilog"
  clock_hz:     10000000
  tiles: "1x1"
  top_module:  "tt_um_AnjaniKad_medical_bms"
  source_files:
    - "project.v"

pinout:
  # Inputs
  ui[0]: "Voltage bit 0 (LSB)"
  ui[1]: "Voltage bit 1"
  ui[2]: "Voltage bit 2"
  ui[3]: "Voltage bit 3 (MSB)"
  ui[4]: "Current level bit 0"
  ui[5]: "Current level bit 1"
  ui[6]: "Temperature fault flag"
  ui[7]: "Safe reset"

  # Outputs
  uo[0]: "Fault flag (any fault active)"
  uo[1]: "Shutdown signal"
  uo[2]: "Thermal latch output"
  uo[3]: "FSM state bit 0"
  uo[4]: "FSM state bit 1"
  uo[5]: "SOC level bit 0"
  uo[6]: "SOC level bit 1"
  uo[7]: "Overcurrent critical flag"

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
